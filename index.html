<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css" />

  <title>Huddle Landing Page</title>
</head>
<body>

  <div class="container">

 
    <div class="logo">
      <img src="logo.svg" alt="Huddle Logo">
    </div>

    <!-- Hero Section-->
    <div class="hero">

      <div class="hero-img">
        <img src="illustration-mockups.svg" alt="">
      </div>

      <div class="hero-txt">
        <h1>
          Build The Community <br>
          Your Fans Will Love
        </h1>

        <p>
          Huddle re-imagines the way we build communities.
          You have a voice, but so does your audience.
          Create connections with your users as you engage
          in genuine discussion.
        </p>

        <button>Register</button>
      </div>

    </div>

   
    <div class="social-links">
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>

  </div>

</body>
</html>
